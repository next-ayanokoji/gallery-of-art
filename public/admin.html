<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Artistry Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Admin Portal</h1>
                <p>Sign in to manage your artwork gallery</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div class="form-error" id="loginError"></div>
                
                <button type="submit" class="btn btn-primary btn-full" id="loginButton">
                    <span class="btn-text">Sign In</span>
                    <div class="btn-loader" style="display: none;"></div>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="#" id="registerLink">Register as Admin</a></p>
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-content modal-small">
            <button class="modal-close" id="registerModalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>
            <div class="modal-header">
                <h3>Register Admin Account</h3>
                <p>Create a new admin account</p>
            </div>
            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" name="username" required placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" required placeholder="Create a password (min 6 characters)">
                </div>
                
                <div class="form-error" id="registerError"></div>
                
                <button type="submit" class="btn btn-primary btn-full" id="registerButton">
                    <span class="btn-text">Register</span>
                    <div class="btn-loader" style="display: none;"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="js/admin-login.js"></script>
</body>
</html>
